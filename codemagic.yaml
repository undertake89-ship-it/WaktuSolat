workflows:
  waktu-solat-build:
    name: Waktu Solat Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build Debug APK
        script: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.2
            chmod +x gradlew
          fi
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/**/**/*.apk
    publishing:
      email:
        recipients:
          - undertake89@gmail.com
